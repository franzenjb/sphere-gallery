<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JBF Now — Bookmark Museum</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0a0c;
    --surface: #101014;
    --ink: #f2f2f0;
    --muted: #b9b9c0;
    --quiet: #8a8a92;
    --line: rgba(242, 242, 240, .16);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #stage {
    position: fixed; inset: 0; cursor: grab;
    transition: opacity .42s ease, filter .42s ease;
  }
  #stage.dragging { cursor: grabbing; }
  canvas { display: block; }

  /* ---------- HUD ---------- */
  .hud { position: fixed; z-index: 10; pointer-events: none; user-select: none; }
  .hud--logo {
    top: 28px; left: 32px;
    font-size: 15px; font-weight: 700; letter-spacing: .34em;
    color: var(--ink);
  }
  .hud--logo span { color: var(--quiet); font-weight: 400; }
  .hud--switch {
    top: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; padding: 4px;
    background: rgba(242,242,240,.08);
    border: 1px solid var(--line);
    border-radius: 8px;
    pointer-events: auto;
  }
  .mode-btn {
    min-width: 92px; height: 34px;
    border: none; border-radius: 6px;
    background: transparent; color: var(--muted);
    cursor: pointer;
    font: 700 11px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: .14em; text-transform: uppercase;
  }
  .mode-btn:hover { color: var(--ink); background: rgba(242,242,240,.1); }
  .mode-btn.active { background: var(--ink); color: var(--surface); }
  .hud--hint {
    bottom: 28px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: .28em; text-transform: uppercase;
    color: var(--muted);
    display: flex; align-items: center; gap: 12px;
    transition: opacity .6s ease;
  }
  .hud--hint.hidden { opacity: 0; }
  .hud--hint::before, .hud--hint::after {
    content: ""; width: 36px; height: 1px; background: #4a4a52;
  }
  .hud--count {
    bottom: 28px; right: 32px;
    font-size: 11px; letter-spacing: .2em; color: var(--quiet);
    font-variant-numeric: tabular-nums;
  }
  .hud--label {
    top: 28px; right: 32px;
    font-size: 11px; letter-spacing: .28em; text-transform: uppercase;
    color: var(--quiet);
  }

  /* hover title that follows cursor */
  #hoverTitle {
    position: fixed; z-index: 9; pointer-events: none;
    font-size: 13px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink); background: rgba(10,10,12,.78);
    padding: 8px 14px; border: 1px solid var(--line);
    transform: translate(14px, 14px);
    opacity: 0; transition: opacity .18s ease;
    white-space: nowrap;
  }

  /* ---------- Detail page ---------- */
  #detail {
    position: fixed; inset: 0; z-index: 20;
    background: var(--surface);
    transform: translateY(100%);
    visibility: hidden;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .detail-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 32px;
  }
  .detail-bar .brand {
    font-size: 13px; font-weight: 700; letter-spacing: .34em; color: var(--ink);
  }
  #closeDetail {
    pointer-events: auto;
    background: var(--ink); color: var(--surface);
    border: none; cursor: pointer;
    font: 600 11px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: .22em; text-transform: uppercase;
    padding: 12px 22px; border-radius: 999px;
  }
  #closeDetail:hover { background: #ffffff; }
  .detail-body {
    flex: 1; display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
    gap: 48px; padding: 0 32px 40px; align-items: center;
    max-width: 1280px; width: 100%; margin: 0 auto;
  }
  .detail-media { overflow: hidden; border-radius: 4px; }
  .detail-media img { width: 100%; height: auto; display: block; transform: scale(1.12); }
  .detail-copy .kicker {
    font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--quiet);
    margin-bottom: 18px;
  }
  .detail-copy h1 {
    font-size: clamp(34px, 5vw, 64px); font-weight: 700; line-height: 1.02;
    letter-spacing: 0; margin-bottom: 22px; color: var(--ink);
  }
  .detail-copy p { font-size: 15px; line-height: 1.7; color: #c7c7cd; max-width: 46ch; }
  #visitLink {
    display: inline-block; margin-top: 28px;
    background: var(--ink); color: var(--surface); text-decoration: none;
    font: 600 11px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: .22em; text-transform: uppercase;
    padding: 14px 26px; border-radius: 999px;
  }
  #visitLink:hover { background: #ffffff; }
  #artGallery {
    position: fixed; inset: 0; z-index: 8;
    overflow-y: auto;
    padding: 96px 32px 48px;
    background: rgba(10,10,12,.94);
    visibility: hidden; opacity: 0;
    transform: translateY(22px);
    pointer-events: none;
    transition: opacity .34s ease, transform .34s ease, visibility .34s ease;
  }
  .art-shell { max-width: 1380px; margin: 0 auto; }
  .art-head {
    display: flex; align-items: end; justify-content: space-between;
    gap: 24px; margin-bottom: 22px;
  }
  .art-head .kicker {
    font-size: 11px; letter-spacing: .28em; text-transform: uppercase;
    color: var(--quiet); margin-bottom: 12px;
  }
  .art-head h1 {
    font-size: clamp(34px, 6vw, 82px);
    line-height: .95; letter-spacing: 0;
  }
  .art-count {
    color: var(--muted);
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .art-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }
  .art-card {
    position: relative;
    min-height: 280px;
    display: flex; flex-direction: column; justify-content: space-between;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    text-decoration: none;
    background: #141418;
    isolation: isolate;
  }
  .art-card img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: saturate(1.08) contrast(1.04);
    z-index: -2;
  }
  .art-card::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(7,7,9,.08), rgba(7,7,9,.78));
    z-index: -1;
  }
  .art-card:hover { border-color: rgba(242,242,240,.42); }
  .art-card-top,
  .art-card-bottom { padding: 16px; }
  .art-card-index {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 38px; height: 26px;
    background: rgba(7,7,9,.62);
    border: 1px solid rgba(242,242,240,.2);
    border-radius: 999px;
    font-size: 11px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .art-card h2 {
    font-size: 19px; line-height: 1.08; letter-spacing: 0;
    margin-bottom: 10px; max-width: 16ch;
    text-wrap: balance;
  }
  .art-card p {
    color: #d8d8dd;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    overflow-wrap: anywhere;
  }
  body[data-view="art"] #stage {
    opacity: .16;
    filter: blur(10px) saturate(.76);
    pointer-events: none;
  }
  body[data-view="art"] #artGallery {
    visibility: visible; opacity: 1; transform: translateY(0);
    pointer-events: auto;
  }
  body[data-view="art"] .hud--hint,
  body[data-view="art"] .hud--count,
  body[data-view="art"] .hud--label { opacity: 0; }
  @media (max-width: 820px) {
    .hud--logo { top: 20px; left: 18px; font-size: 12px; letter-spacing: .22em; }
    .hud--label { display: none; }
    .hud--switch { top: 14px; right: 14px; left: auto; transform: none; }
    .mode-btn { min-width: 76px; height: 32px; letter-spacing: .1em; }
    .hud--hint, .hud--count { display: none; }
    #hoverTitle { display: none; }
    .detail-body { grid-template-columns: 1fr; gap: 24px; overflow-y: auto; align-items: start; }
    .detail-bar { padding: 20px 18px; }
    .detail-body { padding: 0 18px 32px; }
    #artGallery { padding: 78px 16px 44px; }
    .art-head { align-items: start; flex-direction: column; }
    .art-grid { grid-template-columns: repeat(auto-fit, minmax(168px, 1fr)); gap: 12px; }
    .art-card { min-height: 238px; }
    .art-card h2 { font-size: 16px; }
  }
</style>
</head>
<body data-view="sphere">
  <div id="stage"></div>

  <div class="hud hud--logo">JBF<span>&nbsp;/ NOW</span></div>
  <div class="hud hud--switch" role="group" aria-label="Gallery view">
    <button class="mode-btn active" type="button" data-view="sphere" aria-pressed="true">Sphere</button>
    <button class="mode-btn" type="button" data-view="room" aria-pressed="false">Room</button>
  </div>
  <div class="hud hud--label">Chrome Now bookmarks</div>
  <div class="hud hud--hint" id="hint">Drag to explore &nbsp;·&nbsp; Click a card to open</div>
  <div class="hud hud--count" id="count">— BOOKMARKS</div>
  <div id="hoverTitle"></div>

  <section id="artGallery" aria-hidden="true">
    <div class="art-shell">
      <div class="art-head">
        <div>
          <div class="kicker">Bookmark Art Wall</div>
          <h1>Now</h1>
        </div>
        <div class="art-count" id="galleryCount">— BOOKMARKS</div>
      </div>
      <div class="art-grid" id="artGrid"></div>
    </div>
  </section>

  <section id="detail" aria-hidden="true">
    <div class="detail-bar">
      <div class="brand">JBF / NOW</div>
      <button id="closeDetail">Close</button>
    </div>
    <div class="detail-body">
      <div class="detail-media"><img id="detailImg" alt="" /></div>
      <div class="detail-copy">
        <div class="kicker" id="detailKicker">Case Study</div>
        <h1 id="detailTitle">Project</h1>
        <p id="detailText"></p>
        <a id="visitLink" href="#" target="_blank" rel="noopener noreferrer">Open Bookmark</a>
      </div>
    </div>
  </section>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
} }
</script>
<script type="module">
import * as THREE from "three";
import gsap from "gsap";

/* ----------------------------------------------------------------
   Inside-of-a-sphere gallery.
   Camera sits at the origin; cards live on the inner wall of a
   sphere and face the centre. Dragging rotates the whole card
   group with lenis-style eased follow + inertia.
----------------------------------------------------------------- */

function prettyName(slug) {
  return slug.replace(/[-_]+/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}
function displayName(app) {
  return app.title || prettyName(app.name || "bookmark");
}
function shortDomain(app) {
  return app.domain || "Bookmark";
}
function hashString(value) {
  let hash = 2166136261;
  for (let i = 0; i < value.length; i++) {
    hash ^= value.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return hash >>> 0;
}
function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
  const words = String(text).split(/\s+/).filter(Boolean);
  const lines = [];
  let line = "";
  for (const word of words) {
    const test = line ? `${line} ${word}` : word;
    if (ctx.measureText(test).width <= maxWidth || !line) {
      line = test;
    } else {
      lines.push(line);
      line = word;
      if (lines.length === maxLines - 1) break;
    }
  }
  if (line && lines.length < maxLines) lines.push(line);
  for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], x, y + i * lineHeight);
}

const RADIUS = 30;
const stage = document.getElementById("stage");

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0c);
scene.fog = new THREE.Fog(0x0a0a0c, RADIUS * 0.9, RADIUS * 1.65);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 0.001);

/* Faint inner shell + dotted stars so rotation always reads. */
const shell = new THREE.Mesh(
  new THREE.SphereGeometry(RADIUS * 1.4, 48, 32),
  new THREE.MeshBasicMaterial({ color: 0x141418, side: THREE.BackSide, wireframe: true, transparent: true, opacity: 0.18 })
);
const starGeo = new THREE.BufferGeometry();
{
  const pts = [];
  for (let i = 0; i < 420; i++) {
    const v = new THREE.Vector3().randomDirection().multiplyScalar(RADIUS * (1.05 + Math.random() * 0.3));
    pts.push(v.x, v.y, v.z);
  }
  starGeo.setAttribute("position", new THREE.Float32BufferAttribute(pts, 3));
}
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x55555f, size: 0.12 }));

const world = new THREE.Group();      // rotates with drag
world.add(shell, stars);
scene.add(world);

const room = new THREE.Group();
room.visible = false;
scene.add(room);
const roomFrames = [];
const ROOM_START_Z = -1.5;
const ROOM_BACK_LIMIT_Z = 3;
const roomWalk = {
  x: 0,
  tX: 0,
  z: ROOM_START_Z,
  tZ: ROOM_START_Z,
  minZ: -260,
  maxZ: ROOM_BACK_LIMIT_Z,
  minX: -4.4,
  maxX: 4.4,
  sideDrift: 0,
  tSideDrift: 0,
  yaw: 0,
  tYaw: 0,
  pitch: 0,
  tPitch: 0
};

/* ---------- bookmark artwork and screenshots ---------- */
function makeBookmarkArt(i, title, domain, includeLabel = true) {
  const c = document.createElement("canvas");
  c.width = 640; c.height = 480;
  const g = c.getContext("2d");
  const seed = hashString(`${title}|${domain}|${i}`);
  const hue = seed % 360;
  const hue2 = (hue + 58 + (seed % 44)) % 360;
  g.fillStyle = `hsl(${hue}, 36%, 12%)`;
  g.fillRect(0, 0, 640, 480);
  const grad = g.createLinearGradient(0, 0, 640, 480);
  grad.addColorStop(0, `hsl(${hue}, 56%, 34%)`);
  grad.addColorStop(.52, `hsl(${hue2}, 58%, 22%)`);
  grad.addColorStop(1, `hsl(${(hue + 140) % 360}, 42%, 10%)`);
  g.fillStyle = grad; g.fillRect(0, 0, 640, 480);
  g.globalAlpha = .82;
  for (let band = 0; band < 7; band++) {
    const offset = ((seed >> (band * 3)) & 63) - 20;
    g.fillStyle = band % 2 ? "rgba(255,255,255,.1)" : "rgba(0,0,0,.18)";
    g.save();
    g.translate(320, 240);
    g.rotate(((hue + band * 18) / 180) * Math.PI);
    g.fillRect(-420 + offset * 2, -210 + band * 58, 840, 26 + band * 4);
    g.restore();
  }
  g.globalAlpha = 1;
  if (includeLabel) {
    g.fillStyle = "rgba(7,7,9,.62)";
    g.fillRect(0, 342, 640, 138);
    g.fillStyle = "rgba(255,255,255,.88)";
    g.font = "700 16px Helvetica, Arial, sans-serif";
    g.fillText(String(domain).toUpperCase().slice(0, 46), 36, 386);
    g.fillStyle = "#ffffff";
    g.font = "700 38px Helvetica, Arial, sans-serif";
    wrapCanvasText(g, title, 36, 432, 560, 42, 2);
  }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return { texture: t, dataUrl: c.toDataURL("image/jpeg", .9) };
}
const texLoader = new THREE.TextureLoader();
const artCache = new Map();
const wallArtCache = new Map();
function artFor(app, i) {
  const key = `${app.url || app.name || i}`;
  if (!artCache.has(key)) artCache.set(key, makeBookmarkArt(i, displayName(app), shortDomain(app)));
  return artCache.get(key);
}
function wallArtFor(app, i) {
  const key = `${app.url || app.name || i}`;
  if (!wallArtCache.has(key)) wallArtCache.set(key, makeBookmarkArt(i, displayName(app), shortDomain(app), false));
  return wallArtCache.get(key);
}

/* ---------- build cards on inner sphere from the jbf.com fleet ---------- */
const cards = [];
function distributeRows(n) {
  // spread n cards over 5 latitude bands, weighted like a globe
  const weights = [8, 11, 12, 11, 8];
  const lats = [0.9, 0.45, 0.0, -0.45, -0.9];
  const total = weights.reduce((a, b) => a + b, 0);
  const counts = weights.map(w => Math.floor((w / total) * n));
  let rem = n - counts.reduce((a, b) => a + b, 0);
  for (let i = 2; rem > 0; i = (i + 1) % 5) { counts[i]++; rem--; }
  return lats.map((lat, i) => ({ lat, n: counts[i] }));
}

function buildCards(apps) {
  let i = 0;
  for (const row of distributeRows(apps.length)) {
    for (let k = 0; k < row.n; k++) {
      const app = apps[i];
      const title = displayName(app);
      const art = artFor(app, i);
      const phi = Math.PI / 2 - row.lat;                       // polar angle
      const theta = (k / row.n) * Math.PI * 2 + row.lat * 0.7; // stagger rows
      const pos = new THREE.Vector3().setFromSphericalCoords(RADIUS, phi, theta);

      const w = 10, h = 7.5;
      const mat = new THREE.MeshBasicMaterial({ side: THREE.DoubleSide, transparent: true, opacity: 0 });
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
      mat.map = art.texture;
      if (app.img) {
        texLoader.load(app.img, t => {
          t.colorSpace = THREE.SRGBColorSpace;
          mat.map = t;
          mat.needsUpdate = true;
        });
      }

      mesh.position.copy(pos);
      mesh.lookAt(0, 0, 0);
      mesh.userData = {
        title,
        domain: shortDomain(app),
        url: app.url,
        img: app.img || art.dataUrl,
        description: app.description,
        index: i
      };
      world.add(mesh);
      cards.push(mesh);

      // staggered intro
      gsap.to(mat, { opacity: 1, duration: 1.1, delay: 0.18 + i * 0.022, ease: "power2.out" });
      mesh.scale.setScalar(0.6);
      gsap.to(mesh.scale, { x: 1, y: 1, z: 1, duration: 1.2, delay: 0.18 + i * 0.022, ease: "power3.out" });
      i++;
    }
  }
  document.getElementById("count").textContent = `${cards.length} BOOKMARKS`;
}

function buildRoom(apps) {
  room.clear();
  roomFrames.length = 0;
  const bays = Math.ceil(apps.length / 2);
  const spacing = 9.2;
  const length = bays * spacing + 24;
  const roomWidth = 19;
  const wallX = 9.8;
  const frameX = 9.42;
  roomWalk.minZ = -length + 18;
  roomWalk.maxZ = ROOM_BACK_LIMIT_Z;
  roomWalk.minX = -4.4;
  roomWalk.maxX = 4.4;

  const wallMat = new THREE.MeshBasicMaterial({ color: 0x111116, side: THREE.DoubleSide });
  const floorMat = new THREE.MeshBasicMaterial({ color: 0x0d0d11, side: THREE.DoubleSide });
  const lineMat = new THREE.MeshBasicMaterial({ color: 0x24242c, side: THREE.DoubleSide });

  const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, length), floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(0, -5.4, -length / 2 + 8);
  room.add(floor);

  const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, length), new THREE.MeshBasicMaterial({ color: 0x0f0f14, side: THREE.DoubleSide }));
  ceiling.rotation.x = Math.PI / 2;
  ceiling.position.set(0, 7.2, -length / 2 + 8);
  room.add(ceiling);

  for (const side of [-1, 1]) {
    const wall = new THREE.Mesh(new THREE.PlaneGeometry(length, 12.6), wallMat);
    wall.rotation.y = side > 0 ? -Math.PI / 2 : Math.PI / 2;
    wall.position.set(side * wallX, .9, -length / 2 + 8);
    room.add(wall);
  }

  const endWall = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, 12.6), wallMat);
  endWall.position.set(0, .9, -length + 8);
  room.add(endWall);

  for (let bay = 0; bay < bays + 1; bay++) {
    const z = -bay * spacing - 4;
    const stripe = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, .06), lineMat);
    stripe.rotation.x = -Math.PI / 2;
    stripe.position.set(0, -5.35, z);
    room.add(stripe);
  }

  apps.forEach((app, i) => {
    const title = displayName(app);
    const art = artFor(app, i);
    const side = i % 2 === 0 ? -1 : 1;
    const bay = Math.floor(i / 2);
    const z = -bay * spacing - 8.5;
    const x = side * frameX;

    const frame = new THREE.Mesh(
      new THREE.PlaneGeometry(6.8, 4.8),
      new THREE.MeshBasicMaterial({ map: art.texture, side: THREE.DoubleSide })
    );
    if (app.img) {
      texLoader.load(app.img, t => {
        t.colorSpace = THREE.SRGBColorSpace;
        frame.material.map = t;
        frame.material.needsUpdate = true;
      });
    }
    frame.position.set(x, .9, z);
    frame.rotation.y = side > 0 ? -Math.PI / 2 : Math.PI / 2;
    frame.userData = {
      title,
      domain: shortDomain(app),
      url: app.url,
      img: app.img || art.dataUrl,
      description: app.description,
      index: i
    };

    const backing = new THREE.Mesh(
      new THREE.PlaneGeometry(7.34, 5.34),
      new THREE.MeshBasicMaterial({ color: 0x050507, side: THREE.DoubleSide })
    );
    backing.position.set(x + side * .03, .9, z);
    backing.rotation.copy(frame.rotation);

    const rail = new THREE.Mesh(
      new THREE.PlaneGeometry(7.9, .08),
      new THREE.MeshBasicMaterial({ color: 0x454550, side: THREE.DoubleSide })
    );
    rail.position.set(x + side * .04, -2.05, z);
    rail.rotation.copy(frame.rotation);

    room.add(backing, frame, rail);
    roomFrames.push(frame);
  });
}

function buildArtGallery(apps) {
  const grid = document.getElementById("artGrid");
  const fragment = document.createDocumentFragment();
  apps.forEach((app, i) => {
    const title = displayName(app);
    const domain = shortDomain(app);
    const art = wallArtFor(app, i);
    const card = document.createElement("a");
    card.className = "art-card";
    card.href = app.url;
    card.target = "_blank";
    card.rel = "noopener noreferrer";

    const img = document.createElement("img");
    img.src = art.dataUrl;
    img.alt = "";
    card.appendChild(img);

    const top = document.createElement("div");
    top.className = "art-card-top";
    const index = document.createElement("span");
    index.className = "art-card-index";
    index.textContent = String(i + 1).padStart(2, "0");
    top.appendChild(index);

    const bottom = document.createElement("div");
    bottom.className = "art-card-bottom";
    const heading = document.createElement("h2");
    heading.textContent = title;
    const host = document.createElement("p");
    host.textContent = domain;
    bottom.append(heading, host);

    card.append(top, bottom);
    fragment.appendChild(card);
  });
  grid.replaceChildren(fragment);
  document.getElementById("galleryCount").textContent = `${apps.length} BOOKMARKS`;
}

fetch("shots/manifest.json")
  .then(r => r.json())
  .then(apps => {
    buildCards(apps);
    buildRoom(apps);
    buildArtGallery(apps);
  });

let currentView = "sphere";
const modeButtons = [...document.querySelectorAll(".mode-btn")];
function setView(mode) {
  currentView = mode === "room" ? "room" : "sphere";
  document.body.dataset.view = currentView;
  document.getElementById("artGallery").setAttribute("aria-hidden", "true");
  modeButtons.forEach(btn => {
    const active = btn.dataset.view === currentView;
    btn.classList.toggle("active", active);
    btn.setAttribute("aria-pressed", String(active));
  });
  world.visible = currentView === "sphere";
  room.visible = currentView === "room";
  if (currentView === "room") {
    camera.position.set(roomWalk.x, .8, roomWalk.z);
    applyRoomLook();
  } else {
    camera.position.set(0, 0, 0.001);
    camera.rotation.set(0, 0, 0);
  }
  camera.fov = currentView === "room" ? (window.innerWidth <= 820 ? 82 : 66) : 72;
  camera.updateProjectionMatrix();
  document.getElementById("count").textContent =
    currentView === "room" ? `${roomFrames.length} ROOM FRAMES` : `${cards.length} BOOKMARKS`;
  if (currentView === "room") {
    setHover(null);
    hint.classList.add("hidden");
  } else {
    hint.classList.remove("hidden");
  }
}
modeButtons.forEach(btn => btn.addEventListener("click", () => setView(btn.dataset.view)));

/* ---------- lenis-style drag: eased follow + inertia ---------- */
const rot = {
  yaw: 0, pitch: 0,            // rendered
  tYaw: 0, tPitch: 0,          // target
  vYaw: 0, vPitch: 0           // inertia velocity
};
const PITCH_LIMIT = 1.05;
const EASE = 0.075;            // smooth-scroll style lag
const DRAG_K = 0.0042;
const ROOM_LOOK_K = 0.003;
const ROOM_PITCH_LIMIT = 0.72;

let dragging = false, moved = 0;
let roomDragging = false;
let px = 0, py = 0, downX = 0, downY = 0;
let detailOpen = false, animatingOpen = false;
const hint = document.getElementById("hint");
function clampRoomZ(value) {
  return THREE.MathUtils.clamp(value, roomWalk.minZ, roomWalk.maxZ);
}
function clampRoomX(value) {
  return THREE.MathUtils.clamp(value, roomWalk.minX, roomWalk.maxX);
}
function roomForwardVector() {
  return new THREE.Vector3(
    Math.sin(roomWalk.tYaw),
    0,
    -Math.cos(roomWalk.tYaw)
  );
}
function roomRightVector() {
  return new THREE.Vector3(
    Math.cos(roomWalk.tYaw),
    0,
    Math.sin(roomWalk.tYaw)
  );
}
function walkRoom(forward, strafe = 0) {
  const f = roomForwardVector();
  const r = roomRightVector();
  roomWalk.tX = clampRoomX(roomWalk.tX + f.x * forward + r.x * strafe);
  roomWalk.tZ = clampRoomZ(roomWalk.tZ + f.z * forward + r.z * strafe);
  roomWalk.tSideDrift = roomWalk.tX;
}
function applyRoomLook() {
  const cosPitch = Math.cos(roomWalk.pitch);
  const look = new THREE.Vector3(
    Math.sin(roomWalk.yaw) * cosPitch,
    Math.sin(roomWalk.pitch),
    -Math.cos(roomWalk.yaw) * cosPitch
  );
  camera.lookAt(
    camera.position.x + look.x * 24,
    camera.position.y + look.y * 24,
    camera.position.z + look.z * 24
  );
}

stage.addEventListener("pointerdown", e => {
  if (detailOpen || animatingOpen) return;
  if (currentView === "room") {
    roomDragging = true; moved = 0;
    px = downX = e.clientX; py = downY = e.clientY;
    stage.classList.add("dragging");
    stage.setPointerCapture(e.pointerId);
    return;
  }
  if (currentView !== "sphere") return;
  dragging = true; moved = 0;
  px = downX = e.clientX; py = downY = e.clientY;
  rot.vYaw = rot.vPitch = 0;
  stage.classList.add("dragging");
  stage.setPointerCapture(e.pointerId);
});
stage.addEventListener("pointermove", e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  hoverEl.style.left = e.clientX + "px";
  hoverEl.style.top = e.clientY + "px";
  if (roomDragging) {
    const dx = e.clientX - px, dy = e.clientY - py;
    px = e.clientX; py = e.clientY;
    moved += Math.abs(dx) + Math.abs(dy);
    roomWalk.tYaw += dx * ROOM_LOOK_K;
    roomWalk.tPitch = THREE.MathUtils.clamp(roomWalk.tPitch - dy * ROOM_LOOK_K * .72, -ROOM_PITCH_LIMIT, ROOM_PITCH_LIMIT);
    return;
  }
  if (!dragging) return;
  const dx = e.clientX - px, dy = e.clientY - py;
  px = e.clientX; py = e.clientY;
  moved += Math.abs(dx) + Math.abs(dy);
  rot.tYaw += dx * DRAG_K;                 // grab: drag right pulls wall right
  rot.tPitch += dy * DRAG_K;
  rot.tPitch = THREE.MathUtils.clamp(rot.tPitch, -PITCH_LIMIT, PITCH_LIMIT);
  rot.vYaw = dx * DRAG_K;                  // remember velocity for inertia
  rot.vPitch = dy * DRAG_K;
  hint.classList.add("hidden");
});
function endDrag(e) {
  if (roomDragging) {
    roomDragging = false;
    stage.classList.remove("dragging");
    if (moved < 7 && e) tryOpen(e);
    return;
  }
  if (!dragging) return;
  dragging = false;
  stage.classList.remove("dragging");
  if (moved < 7 && e) tryOpen(e);          // click, not drag
}
stage.addEventListener("pointerup", endDrag);
stage.addEventListener("pointercancel", () => endDrag(null));

/* wheel = horizontal orbit, same eased pipeline */
window.addEventListener("wheel", e => {
  if (detailOpen) return;
  if (currentView === "room") {
    walkRoom((e.deltaY + e.deltaX) * .018, 0);
    return;
  }
  if (currentView !== "sphere") return;
  rot.tYaw += (e.deltaY + e.deltaX) * 0.0011;
  hint.classList.add("hidden");
}, { passive: true });

/* ---------- hover ---------- */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-2, -2);
const hoverEl = document.getElementById("hoverTitle");
let hovered = null;

function setHover(mesh) {
  if (hovered === mesh) return;
  if (hovered) gsap.to(hovered.scale, { x: 1, y: 1, z: 1, duration: 0.45, ease: "power3.out" });
  hovered = mesh;
  if (mesh) {
    gsap.to(mesh.scale, { x: 1.1, y: 1.1, z: 1.1, duration: 0.45, ease: "power3.out" });
    hoverEl.textContent = `${mesh.userData.title} - ${mesh.userData.domain}`;
    hoverEl.style.opacity = 1;
  } else {
    hoverEl.style.opacity = 0;
  }
}

/* ---------- click -> animate detail page in ---------- */
const detail = document.getElementById("detail");
const savedQuat = new THREE.Quaternion();
const detailImg = document.getElementById("detailImg");
const detailTitle = document.getElementById("detailTitle");
const detailKicker = document.getElementById("detailKicker");
const detailText = document.getElementById("detailText");
const visitLink = document.getElementById("visitLink");
let detailSourceView = "sphere";

function tryOpen(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hit = raycaster.intersectObjects(currentView === "room" ? roomFrames : cards)[0];
  if (hit) openDetail(hit.object);
}

function openDetail(mesh) {
  if (detailOpen || animatingOpen) return;
  animatingOpen = true;
  detailSourceView = currentView;
  const d = mesh.userData;
  detailTitle.textContent = d.title;
  detailKicker.textContent = `${d.domain} - ${String(d.index + 1).padStart(2, "0")}`;
  detailText.textContent =
    `${d.title} is saved in the Chrome Now bookmark folder. Open it to continue from ${d.domain}.`;
  detailImg.src = d.img;
  visitLink.href = d.url;
  visitLink.textContent = d.url.startsWith("file:") ? "Open Local Bookmark" : "Open Bookmark";
  detail.setAttribute("aria-hidden", "false");
  setHover(null);

  if (currentView === "room") {
    const tl = gsap.timeline({ onComplete: () => { detailOpen = true; animatingOpen = false; } });
    tl.set(detail, { visibility: "visible", y: 0, yPercent: 100 }, 0)
      .to(detail, { yPercent: 0, duration: 0.72, ease: "power4.inOut" }, 0)
      .from(".detail-copy > *", { y: 36, opacity: 0, stagger: 0.07, duration: 0.55, ease: "power3.out" }, 0.42)
      .from(detailImg, { scale: 1.18, duration: .85, ease: "power3.out" }, 0.36);
    return;
  }

  const tl = gsap.timeline({ onComplete: () => { detailOpen = true; animatingOpen = false; } });
  // dolly toward the clicked card, then slide the page up over it
  savedQuat.copy(camera.quaternion);
  const target = mesh.getWorldPosition(new THREE.Vector3());
  const dir = target.clone().normalize();
  tl.to(camera.position, {
    x: dir.x * 9, y: dir.y * 9, z: dir.z * 9,
    duration: 0.7, ease: "power3.inOut",
    onUpdate: () => camera.lookAt(target)
  }, 0)
    .to(camera, { fov: 50, duration: 0.7, ease: "power3.inOut", onUpdate: () => camera.updateProjectionMatrix() }, 0)
    .set(detail, { visibility: "visible", y: 0, yPercent: 100 }, 0)
    .to(detail, { yPercent: 0, duration: 0.8, ease: "power4.inOut" }, 0.25)
    .from(".detail-copy > *", { y: 36, opacity: 0, stagger: 0.07, duration: 0.6, ease: "power3.out" }, 0.7)
    .from(detailImg, { scale: 1.3, duration: 1.0, ease: "power3.out" }, 0.65);
}

function closeDetail() {
  if (!detailOpen || animatingOpen) return;
  animatingOpen = true;
  if (detailSourceView === "room") {
    const tl = gsap.timeline({
      onComplete: () => {
        detailOpen = false; animatingOpen = false;
        detail.style.visibility = "hidden";
        detail.setAttribute("aria-hidden", "true");
      }
    });
    tl.to(detail, { yPercent: 100, duration: 0.68, ease: "power4.inOut" }, 0);
    return;
  }
  const tl = gsap.timeline({
    onComplete: () => {
      detailOpen = false; animatingOpen = false;
      detail.style.visibility = "hidden";
      detail.setAttribute("aria-hidden", "true");
    }
  });
  const fromQuat = camera.quaternion.clone();
  const lerp = { t: 0 };
  tl.to(detail, { yPercent: 100, duration: 0.7, ease: "power4.inOut" }, 0)
    .to(camera.position, { x: 0, y: 0, z: 0.001, duration: 0.8, ease: "power3.inOut" }, 0.1)
    .to(lerp, {
      t: 1, duration: 0.8, ease: "power3.inOut",
      onUpdate: () => camera.quaternion.slerpQuaternions(fromQuat, savedQuat, lerp.t)
    }, 0.1)
    .to(camera, {
      fov: 72, duration: 0.8, ease: "power3.inOut",
      onUpdate: () => camera.updateProjectionMatrix()
    }, 0.1);
}
document.getElementById("closeDetail").addEventListener("click", closeDetail);
window.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    closeDetail();
    return;
  }
  if (detailOpen || animatingOpen || currentView !== "room") return;
  if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") walkRoom(5.5, 0);
  if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") walkRoom(-5.5, 0);
  if (e.key.toLowerCase() === "a") walkRoom(0, -1.2);
  if (e.key.toLowerCase() === "d") walkRoom(0, 1.2);
  if (e.key === "ArrowLeft") roomWalk.tYaw -= .34;
  if (e.key === "ArrowRight") roomWalk.tYaw += .34;
});

/* ---------- frame loop ---------- */
function tick() {
  requestAnimationFrame(tick);

  if (currentView === "room") {
    roomWalk.z += (roomWalk.tZ - roomWalk.z) * .11;
    roomWalk.x += (roomWalk.tX - roomWalk.x) * .1;
    roomWalk.sideDrift = roomWalk.x;
    roomWalk.yaw += (roomWalk.tYaw - roomWalk.yaw) * .14;
    roomWalk.pitch += (roomWalk.tPitch - roomWalk.pitch) * .14;
    camera.position.set(roomWalk.x, .8, roomWalk.z);
    applyRoomLook();

    if (!detailOpen && !animatingOpen && !roomDragging) {
      raycaster.setFromCamera(mouse, camera);
      const hit = raycaster.intersectObjects(roomFrames)[0];
      setHover(hit ? hit.object : null);
      stage.style.cursor = hit ? "pointer" : "grab";
    }

    renderer.render(scene, camera);
    return;
  }

  if (!dragging) {
    // inertia feeds the target, target eases into the render — lenis feel
    rot.vYaw *= 0.94; rot.vPitch *= 0.94;
    rot.tYaw += rot.vYaw;
    rot.tPitch = THREE.MathUtils.clamp(rot.tPitch + rot.vPitch, -PITCH_LIMIT, PITCH_LIMIT);
  }
  rot.yaw += (rot.tYaw - rot.yaw) * EASE;
  rot.pitch += (rot.tPitch - rot.pitch) * EASE;
  world.rotation.set(rot.pitch, rot.yaw, 0);

  if (!detailOpen && !animatingOpen && !dragging && currentView === "sphere") {
    raycaster.setFromCamera(mouse, camera);
    const hit = raycaster.intersectObjects(cards)[0];
    setHover(hit ? hit.object : null);
    document.body.style.cursor = "";
    stage.style.cursor = hit ? "pointer" : "grab";
  }

  renderer.render(scene, camera);
}
tick();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  if (currentView === "room") camera.fov = window.innerWidth <= 820 ? 82 : 66;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* test hooks */
window.__app = {
  rot, cards, roomFrames, roomWalk, camera, world, room, renderer,
  setView,
  viewMode: () => currentView,
  screenPos(mesh) {
    const v = mesh.getWorldPosition(new THREE.Vector3()).project(camera);
    return {
      x: (v.x * 0.5 + 0.5) * window.innerWidth,
      y: (-v.y * 0.5 + 0.5) * window.innerHeight,
      inFront: v.z < 1
    };
  },
  isDetailOpen: () => detailOpen,
  openFirst: () => openDetail(cards[0]),
  close: closeDetail
};
</script>
</body>
</html>
