<style>
  :root {
    color-scheme: dark;
    --bg: #09090a;
    --bg-2: #101014;
    --ink: #f3efe4;
    --muted: #b9b5aa;
    --quiet: #807c73;
    --panel: #f3efe4;
    --panel-ink: #171612;
    --panel-muted: #625f56;
    --panel-soft: #e7dfcf;
    --line: rgba(243, 239, 228, .18);
    --panel-line: rgba(23, 22, 18, .16);
    --red: #d44635;
    --gold: #c59a46;
    --blue: #5f8ea8;
    --green: #7d9a72;
    --violet: #8b7bb2;
    --panel-width: 360px;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--bg); }
  body {
    font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  button, input { font: inherit; }
  a { color: inherit; }
  .skip-link {
    position: fixed;
    left: 16px;
    top: 12px;
    z-index: 30;
    transform: translateY(-160%);
    background: var(--panel);
    color: var(--panel-ink);
    padding: 10px 14px;
    border-radius: 6px;
  }
  .skip-link:focus { transform: translateY(0); }

  #stage {
    position: fixed;
    inset: 0;
    cursor: grab;
    background:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
      radial-gradient(circle at 50% 45%, #171717 0, #09090a 62%);
    background-size: 32px 32px, 32px 32px, 100% 100%;
    transition: opacity .28s ease, filter .28s ease;
  }
  #stage.dragging { cursor: grabbing; }
  canvas { display: block; }

  .topbar {
    position: fixed;
    z-index: 12;
    top: 20px;
    left: calc(var(--panel-width) + 24px);
    right: 24px;
    min-height: 46px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    pointer-events: none;
    transition: left .24s ease;
  }
  body[data-panel="closed"] .topbar { left: 24px; }
  .brand {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .28em;
    text-transform: uppercase;
  }
  .brand span { color: var(--muted); font-weight: 500; }
  .view-switch {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(9, 9, 10, .72);
    pointer-events: auto;
  }
  .mode-btn {
    min-width: 84px;
    height: 34px;
    border: 0;
    border-radius: 5px;
    color: var(--muted);
    background: transparent;
    cursor: pointer;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
    transition: background .2s ease, color .2s ease, transform .2s ease;
  }
  .mode-btn:hover { color: var(--ink); background: rgba(243,239,228,.1); }
  .mode-btn:active { transform: translateY(1px) scale(.99); }
  .mode-btn:focus-visible,
  #panelToggle:focus-visible,
  #panelOpen:focus-visible,
  .cluster-btn:focus-visible,
  .result-btn:focus-visible,
  .open-link:focus-visible,
  .board-card:focus-visible,
  #searchInput:focus-visible {
    outline: 2px solid var(--red);
    outline-offset: 2px;
  }
  .mode-btn.active { background: var(--ink); color: #101014; }
  #stats {
    justify-self: end;
    color: var(--muted);
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
  }

  #libraryPanel {
    position: fixed;
    z-index: 18;
    top: 0;
    left: 0;
    bottom: 0;
    width: var(--panel-width);
    min-width: 280px;
    max-width: min(540px, 86vw);
    display: grid;
    grid-template-rows: auto auto minmax(0, 1fr);
    background: var(--panel);
    color: var(--panel-ink);
    border-right: 1px solid var(--panel-line);
    box-shadow: 18px 0 42px rgba(0, 0, 0, .28);
    transform: translateX(0);
    transition: transform .24s ease;
  }
  body[data-panel="closed"] #libraryPanel { transform: translateX(calc(-1 * var(--panel-width))); }
  .panel-head {
    padding: 22px 22px 16px;
    border-bottom: 1px solid var(--panel-line);
  }
  .panel-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .panel-kicker {
    margin-bottom: 8px;
    color: var(--panel-muted);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .18em;
    text-transform: uppercase;
  }
  .panel-head h1 {
    margin: 0;
    color: var(--panel-ink);
    font-size: clamp(26px, 3vw, 36px);
    line-height: 1;
    letter-spacing: 0;
    text-wrap: balance;
  }
  #panelToggle,
  #panelOpen {
    border: 1px solid var(--panel-line);
    border-radius: 7px;
    background: #171612;
    color: var(--panel);
    cursor: pointer;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    transition: transform .2s ease, background .2s ease;
  }
  #panelToggle {
    width: 64px;
    height: 34px;
  }
  #panelOpen {
    position: fixed;
    z-index: 16;
    top: 22px;
    left: 20px;
    height: 36px;
    padding: 0 14px;
    opacity: 0;
    pointer-events: none;
  }
  body[data-panel="closed"] #panelOpen { opacity: 1; pointer-events: auto; }
  #panelToggle:hover,
  #panelOpen:hover { background: #2a271f; }
  #panelToggle:active,
  #panelOpen:active { transform: translateY(1px); }
  #resizeHandle {
    position: absolute;
    top: 0;
    right: -5px;
    width: 10px;
    height: 100%;
    cursor: col-resize;
  }
  #resizeHandle::after {
    content: "";
    position: absolute;
    right: 4px;
    top: 16px;
    bottom: 16px;
    width: 1px;
    background: rgba(23,22,18,.18);
  }
  .search-row {
    padding: 16px 22px 18px;
    border-bottom: 1px solid var(--panel-line);
  }
  #searchInput {
    width: 100%;
    height: 40px;
    border: 1px solid var(--panel-line);
    border-radius: 7px;
    background: #fffaf0;
    color: var(--panel-ink);
    padding: 0 12px;
  }
  #searchInput::placeholder { color: #7c7569; opacity: 1; }
  .cluster-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  .cluster-btn {
    height: 30px;
    border: 1px solid var(--panel-line);
    border-radius: 6px;
    background: transparent;
    color: var(--panel-muted);
    cursor: pointer;
    padding: 0 9px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .cluster-btn:hover { color: var(--panel-ink); border-color: rgba(23,22,18,.32); }
  .cluster-btn.active { background: var(--panel-ink); color: var(--panel); }
  .panel-scroll {
    overflow: auto;
    padding: 18px 22px 24px;
  }
  .selected {
    border-bottom: 1px solid var(--panel-line);
    padding-bottom: 18px;
    margin-bottom: 18px;
  }
  .selected-preview {
    width: 100%;
    aspect-ratio: 1.38;
    overflow: hidden;
    border-radius: 8px;
    background: #171612;
    border: 1px solid var(--panel-line);
  }
  .selected-preview img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }
  .selected-meta {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin: 14px 0 9px;
    color: var(--panel-muted);
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 11px;
    text-transform: uppercase;
  }
  .selected h2 {
    margin: 0 0 8px;
    font-size: 24px;
    line-height: 1.06;
    letter-spacing: 0;
    color: var(--panel-ink);
    text-wrap: balance;
  }
  .selected p {
    margin: 0;
    color: var(--panel-muted);
    font-size: 13px;
    line-height: 1.5;
    overflow-wrap: anywhere;
  }
  .open-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    margin-top: 14px;
    padding: 0 16px;
    border-radius: 7px;
    background: var(--red);
    color: #fffaf0;
    text-decoration: none;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .open-link:hover { background: #b93426; }
  .result-list {
    display: grid;
    gap: 7px;
  }
  .result-btn {
    width: 100%;
    min-height: 54px;
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr);
    gap: 10px;
    align-items: center;
    border: 1px solid transparent;
    border-radius: 7px;
    background: transparent;
    color: var(--panel-ink);
    text-align: left;
    cursor: pointer;
    padding: 8px;
  }
  .result-btn:hover { background: rgba(23,22,18,.06); }
  .result-btn.active { background: #fffaf0; border-color: rgba(23,22,18,.18); }
  .result-index {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border-radius: 6px;
    color: #fffaf0;
    background: #171612;
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 11px;
  }
  .result-copy strong {
    display: block;
    overflow: hidden;
    color: var(--panel-ink);
    font-size: 13px;
    line-height: 1.18;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result-copy span {
    display: block;
    overflow: hidden;
    margin-top: 4px;
    color: var(--panel-muted);
    font-size: 11px;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #hoverTitle {
    position: fixed;
    z-index: 11;
    max-width: 320px;
    pointer-events: none;
    opacity: 0;
    transform: translate(14px, 14px);
    background: rgba(9,9,10,.82);
    border: 1px solid var(--line);
    border-radius: 7px;
    color: var(--ink);
    padding: 8px 11px;
    font-size: 12px;
    font-weight: 800;
    line-height: 1.2;
    transition: opacity .16s ease;
  }

  #boardView {
    position: fixed;
    z-index: 9;
    top: 0;
    right: 0;
    bottom: 0;
    left: var(--panel-width);
    overflow: auto;
    padding: 94px 26px 34px;
    visibility: hidden;
    opacity: 0;
    pointer-events: none;
    transform: translateY(12px);
    transition: opacity .26s ease, transform .26s ease, visibility .26s ease, left .24s ease;
  }
  body[data-panel="closed"] #boardView { left: 0; }
  body[data-view="board"] #stage {
    opacity: .18;
    filter: blur(5px) saturate(.6);
    pointer-events: none;
  }
  body[data-view="board"] #boardView {
    visibility: visible;
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  #boardGrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 14px;
  }
  .board-card {
    min-height: 286px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(16,16,20,.84);
    color: var(--ink);
    cursor: pointer;
    padding: 10px;
    text-align: left;
    transition: transform .18s ease, border-color .18s ease, background .18s ease;
  }
  .board-card:hover {
    transform: translateY(-2px);
    border-color: rgba(243,239,228,.42);
    background: rgba(25,25,30,.94);
  }
  .board-card.active { border-color: var(--red); }
  .board-card img {
    width: 100%;
    aspect-ratio: 1.43;
    display: block;
    object-fit: cover;
    border-radius: 5px;
    background: #171612;
  }
  .board-card strong {
    display: block;
    margin-top: 3px;
    font-size: 15px;
    line-height: 1.12;
    text-wrap: balance;
  }
  .board-card span {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 11px;
    overflow-wrap: anywhere;
  }

  @media (max-width: 860px) {
    :root { --panel-width: min(360px, 88vw); }
    .topbar {
      left: 14px;
      right: 14px;
      top: 12px;
      grid-template-columns: 1fr auto;
    }
    body[data-panel="open"] .topbar { opacity: 0; pointer-events: none; }
    .brand { font-size: 11px; letter-spacing: .18em; }
    #stats { display: none; }
    .view-switch { justify-self: end; }
    .mode-btn { min-width: 72px; height: 32px; letter-spacing: .1em; }
    #libraryPanel { max-width: 88vw; }
    #panelOpen { top: 14px; left: 14px; }
    #boardView,
    body[data-panel="closed"] #boardView {
      left: 0;
      padding: 74px 14px 24px;
    }
    #boardGrid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
    .board-card { min-height: 236px; padding: 8px; }
  }
</style>

<script type="module">
import * as THREE from "three";

const CATEGORY_ORDER = ["jbf", "vercel", "arcgis", "web", "local"];
const CATEGORIES = {
  all: { label: "All", color: "#171612" },
  jbf: { label: "JBF", color: "#d44635" },
  vercel: { label: "Vercel", color: "#c59a46" },
  arcgis: { label: "ArcGIS", color: "#5f8ea8" },
  web: { label: "Web", color: "#7d9a72" },
  local: { label: "Local", color: "#8b7bb2" }
};

const stage = document.getElementById("stage");
const stats = document.getElementById("stats");
const hoverEl = document.getElementById("hoverTitle");
const searchInput = document.getElementById("searchInput");
const clusterButtons = document.getElementById("clusterButtons");
const resultList = document.getElementById("resultList");
const boardGrid = document.getElementById("boardGrid");
const selectedPreview = document.getElementById("selectedPreview");
const selectedKind = document.getElementById("selectedKind");
const selectedCount = document.getElementById("selectedCount");
const selectedTitle = document.getElementById("selectedTitle");
const selectedDomain = document.getElementById("selectedDomain");
const selectedLink = document.getElementById("selectedLink");
const panel = document.getElementById("libraryPanel");
const panelToggle = document.getElementById("panelToggle");
const panelOpen = document.getElementById("panelOpen");
const resizeHandle = document.getElementById("resizeHandle");

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x09090a);
scene.fog = new THREE.Fog(0x09090a, 38, 82);
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 160);
camera.position.set(0, 0, 0.001);

const world = new THREE.Group();
scene.add(world);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-2, -2);
const texLoader = new THREE.TextureLoader();
const cards = [];
const apps = [];
let filtered = [];
let activeCluster = "all";
let selectedIndex = 0;
let currentView = "atlas";
let hovered = null;
let ready = false;

const rot = { yaw: 0, pitch: 0, tYaw: 0, tPitch: 0, vYaw: 0, vPitch: 0 };
const EASE = 0.08;
const DRAG_K = 0.004;
const PITCH_LIMIT = 0.78;
let dragging = false;
let moved = 0;
let px = 0;
let py = 0;

function hashString(value) {
  let hash = 2166136261;
  for (let i = 0; i < value.length; i++) {
    hash ^= value.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return hash >>> 0;
}

function displayName(app) {
  return app.title || app.name || "Bookmark";
}

function classify(app) {
  const domain = String(app.domain || "").toLowerCase();
  const url = String(app.url || "").toLowerCase();
  if (url.startsWith("file:")) return "local";
  if (domain.includes("arcgis") || url.includes("arcgis.com") || url.includes("arcgis-rest")) return "arcgis";
  if (domain.endsWith("jbf.com") || domain.includes(".jbf.com")) return "jbf";
  if (domain.includes("vercel.app") || domain.includes("vercel.com")) return "vercel";
  return "web";
}

function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
  const words = String(text).split(/\s+/).filter(Boolean);
  const lines = [];
  let line = "";
  for (const word of words) {
    const test = line ? `${line} ${word}` : word;
    if (ctx.measureText(test).width <= maxWidth || !line) {
      line = test;
    } else {
      lines.push(line);
      line = word;
      if (lines.length === maxLines - 1) break;
    }
  }
  if (line && lines.length < maxLines) lines.push(line);
  for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], x, y + i * lineHeight);
}

function posterFor(app) {
  const canvas = document.createElement("canvas");
  canvas.width = 720;
  canvas.height = 504;
  const ctx = canvas.getContext("2d");
  const cat = CATEGORIES[app.kind];
  const seed = hashString(`${app.title}|${app.domain}|${app.url}`);
  const hue = (seed % 48) - 14;

  ctx.fillStyle = "#12110f";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  grad.addColorStop(0, cat.color);
  grad.addColorStop(.44, `hsl(${38 + hue}, 28%, 22%)`);
  grad.addColorStop(1, "#111112");
  ctx.globalAlpha = .82;
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = 1;

  ctx.strokeStyle = "rgba(255,250,240,.20)";
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const y = 54 + i * 48 + ((seed >> i) & 18);
    ctx.beginPath();
    ctx.moveTo(34, y);
    ctx.lineTo(680, y - 80 + (i % 3) * 44);
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(255,250,240,.11)";
  for (let i = 0; i < 24; i++) {
    const w = 18 + ((seed >> (i % 16)) & 28);
    const h = 8 + ((seed >> ((i + 4) % 16)) & 18);
    const x = 44 + ((seed * (i + 3)) % 620);
    const y = 44 + ((seed * (i + 11)) % 410);
    ctx.fillRect(x, y, w, h);
  }

  ctx.fillStyle = "rgba(9,9,10,.62)";
  ctx.fillRect(0, 0, 720, 504);
  ctx.fillStyle = cat.color;
  ctx.fillRect(0, 0, 16, 504);
  ctx.fillStyle = "#fffaf0";
  ctx.font = "800 18px Avenir Next, Helvetica, Arial, sans-serif";
  ctx.fillText(cat.label.toUpperCase(), 42, 54);
  ctx.font = "700 15px SFMono-Regular, Menlo, Consolas, monospace";
  ctx.fillText(String(app.sourceIndex || app.index + 1).padStart(2, "0"), 642, 54);
  ctx.fillStyle = "rgba(255,250,240,.78)";
  ctx.font = "700 19px SFMono-Regular, Menlo, Consolas, monospace";
  wrapCanvasText(ctx, app.domain, 42, 404, 620, 26, 2);
  ctx.fillStyle = "#fffaf0";
  ctx.font = "800 44px Avenir Next, Helvetica, Arial, sans-serif";
  wrapCanvasText(ctx, app.title, 42, 146, 612, 52, 4);

  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  return { texture, dataUrl: canvas.toDataURL("image/jpeg", .9) };
}

function addBackdrop() {
  const points = [];
  for (let i = 0; i < 560; i++) {
    const v = new THREE.Vector3().randomDirection().multiplyScalar(42 + Math.random() * 34);
    points.push(v.x, v.y, v.z);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute("position", new THREE.Float32BufferAttribute(points, 3));
  world.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x6c6962, size: 0.09 })));

  CATEGORY_ORDER.forEach((kind, row) => {
    const y = (row - 2) * 4.8;
    const radius = 28 + (row % 2) * 2.4;
    const pts = [];
    for (let i = 0; i < 180; i++) {
      const a = (i / 180) * Math.PI * 2;
      pts.push(new THREE.Vector3(Math.sin(a) * radius, y, -Math.cos(a) * radius));
    }
    const ring = new THREE.LineLoop(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: CATEGORIES[kind].color, transparent: true, opacity: .24 })
    );
    world.add(ring);
  });
}

function buildAtlas() {
  const grouped = new Map(CATEGORY_ORDER.map(kind => [kind, apps.filter(app => app.kind === kind)]));
  grouped.forEach((items, kind) => {
    const row = CATEGORY_ORDER.indexOf(kind);
    const y = (row - 2) * 4.8;
    const radius = 28 + (row % 2) * 2.4;
    const offset = (hashString(kind) % 100) / 100 * Math.PI * 2;
    items.forEach((app, i) => {
      const theta = offset + (i / Math.max(1, items.length)) * Math.PI * 2;
      const group = new THREE.Group();
      group.position.set(Math.sin(theta) * radius, y, -Math.cos(theta) * radius);
      group.lookAt(0, y * .18, 0);

      const frame = new THREE.Mesh(
        new THREE.PlaneGeometry(7.95, 5.65),
        new THREE.MeshBasicMaterial({ color: CATEGORIES[kind].color, transparent: true, opacity: .92, side: THREE.DoubleSide })
      );
      frame.position.z = -0.04;

      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(7.45, 5.18),
        new THREE.MeshBasicMaterial({ map: app.poster.texture, transparent: true, opacity: 1, side: THREE.DoubleSide })
      );
      mesh.userData = { index: app.index, group, frame };
      group.userData = { index: app.index, theta };
      group.add(frame, mesh);
      world.add(group);
      cards[app.index] = mesh;
    });
  });
}

function buildClusters() {
  const counts = Object.fromEntries(CATEGORY_ORDER.map(kind => [kind, apps.filter(app => app.kind === kind).length]));
  const labels = ["all", ...CATEGORY_ORDER];
  clusterButtons.replaceChildren(...labels.map(kind => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "cluster-btn";
    btn.dataset.cluster = kind;
    btn.textContent = kind === "all" ? `All ${apps.length}` : `${CATEGORIES[kind].label} ${counts[kind] || 0}`;
    btn.addEventListener("click", () => {
      activeCluster = kind;
      applyFilters();
    });
    return btn;
  }));
}

function matchesSearch(app, query) {
  if (!query) return true;
  const hay = `${app.title} ${app.domain} ${app.url} ${CATEGORIES[app.kind].label}`.toLowerCase();
  return hay.includes(query);
}

function getFilteredApps() {
  const query = searchInput.value.trim().toLowerCase();
  return apps.filter(app => (activeCluster === "all" || app.kind === activeCluster) && matchesSearch(app, query));
}

function applyFilters({ preserveSelection = false } = {}) {
  filtered = getFilteredApps();
  const filteredSet = new Set(filtered.map(app => app.index));
  cards.forEach(mesh => {
    if (!mesh) return;
    const visible = filteredSet.has(mesh.userData.index);
    const selected = mesh.userData.index === selectedIndex;
    mesh.material.opacity = visible ? 1 : .12;
    mesh.userData.frame.material.opacity = selected ? 1 : (visible ? .72 : .12);
    mesh.userData.group.scale.setScalar(selected ? 1.18 : (visible ? 1 : .82));
  });
  [...clusterButtons.children].forEach(btn => btn.classList.toggle("active", btn.dataset.cluster === activeCluster));
  renderResults();
  renderBoard();
  stats.textContent = `${filtered.length} / ${apps.length}`;
  if (!preserveSelection && filtered.length && !filteredSet.has(selectedIndex)) selectIndex(filtered[0].index, { rotate: true });
  if (!filtered.length) {
    resultList.replaceChildren();
    boardGrid.replaceChildren();
  }
}

function renderResults() {
  const fragment = document.createDocumentFragment();
  filtered.forEach(app => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "result-btn";
    btn.dataset.index = app.index;
    btn.classList.toggle("active", app.index === selectedIndex);
    btn.innerHTML = `<span class="result-index">${String(app.sourceIndex || app.index + 1).padStart(2, "0")}</span><span class="result-copy"><strong></strong><span></span></span>`;
    btn.querySelector("strong").textContent = app.title;
    btn.querySelector(".result-copy span").textContent = app.domain;
    btn.addEventListener("click", () => selectIndex(app.index, { rotate: true }));
    fragment.appendChild(btn);
  });
  resultList.replaceChildren(fragment);
}

function renderBoard() {
  const fragment = document.createDocumentFragment();
  filtered.forEach(app => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "board-card";
    card.dataset.index = app.index;
    card.classList.toggle("active", app.index === selectedIndex);
    const img = document.createElement("img");
    img.src = app.poster.dataUrl;
    img.alt = "";
    const text = document.createElement("div");
    const title = document.createElement("strong");
    title.textContent = app.title;
    const domain = document.createElement("span");
    domain.textContent = `${CATEGORIES[app.kind].label} / ${app.domain}`;
    text.append(title, domain);
    card.append(img, text);
    card.addEventListener("click", () => selectIndex(app.index, { rotate: true }));
    fragment.appendChild(card);
  });
  boardGrid.replaceChildren(fragment);
}

function selectIndex(index, { rotate = false } = {}) {
  if (!apps[index]) return;
  selectedIndex = index;
  const app = apps[index];
  selectedPreview.src = app.img || app.poster.dataUrl;
  selectedPreview.alt = app.img ? `${app.title} capture` : `${app.title} placard`;
  selectedKind.textContent = CATEGORIES[app.kind].label;
  selectedCount.textContent = String(app.sourceIndex || app.index + 1).padStart(2, "0");
  selectedTitle.textContent = app.title;
  selectedDomain.textContent = app.url;
  selectedLink.href = app.url;
  selectedLink.textContent = app.url.startsWith("file:") ? "Open Local Bookmark" : "Open Bookmark";

  cards.forEach(mesh => {
    if (!mesh) return;
    const selected = mesh.userData.index === selectedIndex;
    const visible = filtered.some(item => item.index === mesh.userData.index);
    mesh.userData.frame.material.opacity = selected ? 1 : (visible ? .72 : .12);
    mesh.userData.group.scale.setScalar(selected ? 1.18 : (visible ? 1 : .82));
  });
  renderResults();
  renderBoard();
  if (rotate) {
    const theta = cards[index].userData.group.userData.theta;
    rot.tYaw = -theta;
    rot.tPitch = THREE.MathUtils.clamp(-(cards[index].userData.group.position.y / 34), -PITCH_LIMIT, PITCH_LIMIT);
  }
}

function setHover(mesh) {
  if (hovered === mesh) return;
  hovered = mesh;
  if (mesh) {
    const app = apps[mesh.userData.index];
    hoverEl.textContent = `${app.title} - ${app.domain}`;
    hoverEl.style.opacity = 1;
  } else {
    hoverEl.style.opacity = 0;
  }
}

function setView(mode) {
  currentView = mode === "board" ? "board" : "atlas";
  document.body.dataset.view = currentView;
  document.getElementById("boardView").setAttribute("aria-hidden", String(currentView !== "board"));
  document.querySelectorAll(".mode-btn").forEach(btn => {
    const active = btn.dataset.view === currentView;
    btn.classList.toggle("active", active);
    btn.setAttribute("aria-pressed", String(active));
  });
  setHover(null);
}

document.querySelectorAll(".mode-btn").forEach(btn => btn.addEventListener("click", () => setView(btn.dataset.view)));
searchInput.addEventListener("input", () => applyFilters());

stage.addEventListener("pointerdown", e => {
  if (currentView !== "atlas") return;
  dragging = true;
  moved = 0;
  px = e.clientX;
  py = e.clientY;
  rot.vYaw = 0;
  rot.vPitch = 0;
  stage.classList.add("dragging");
  stage.setPointerCapture(e.pointerId);
});

stage.addEventListener("pointermove", e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  hoverEl.style.left = `${e.clientX}px`;
  hoverEl.style.top = `${e.clientY}px`;
  if (!dragging) return;
  const dx = e.clientX - px;
  const dy = e.clientY - py;
  px = e.clientX;
  py = e.clientY;
  moved += Math.abs(dx) + Math.abs(dy);
  rot.tYaw += dx * DRAG_K;
  rot.tPitch = THREE.MathUtils.clamp(rot.tPitch + dy * DRAG_K, -PITCH_LIMIT, PITCH_LIMIT);
  rot.vYaw = dx * DRAG_K;
  rot.vPitch = dy * DRAG_K;
});

function endDrag(e) {
  if (!dragging) return;
  dragging = false;
  stage.classList.remove("dragging");
  if (moved < 7 && e) {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(filtered.map(app => cards[app.index]).filter(Boolean));
    if (hits[0]) selectIndex(hits[0].object.userData.index, { rotate: false });
  }
}
stage.addEventListener("pointerup", endDrag);
stage.addEventListener("pointercancel", () => endDrag(null));

window.addEventListener("wheel", e => {
  if (currentView !== "atlas") return;
  rot.tYaw += (e.deltaY + e.deltaX) * .0011;
}, { passive: true });

function tick() {
  requestAnimationFrame(tick);
  if (!dragging) {
    rot.vYaw *= .93;
    rot.vPitch *= .93;
    rot.tYaw += rot.vYaw;
    rot.tPitch = THREE.MathUtils.clamp(rot.tPitch + rot.vPitch, -PITCH_LIMIT, PITCH_LIMIT);
  }
  rot.yaw += (rot.tYaw - rot.yaw) * EASE;
  rot.pitch += (rot.tPitch - rot.pitch) * EASE;
  world.rotation.set(rot.pitch, rot.yaw, 0);

  if (currentView === "atlas" && !dragging) {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(filtered.map(app => cards[app.index]).filter(Boolean));
    setHover(hits[0] ? hits[0].object : null);
    stage.style.cursor = hits[0] ? "pointer" : "grab";
  }
  renderer.render(scene, camera);
}

function setPanelWidth(width) {
  const next = Math.max(280, Math.min(width, Math.min(540, window.innerWidth * .86)));
  document.documentElement.style.setProperty("--panel-width", `${next}px`);
  try { localStorage.setItem("nowAtlasPanelWidth", String(next)); } catch {}
}

function setPanelOpen(open) {
  document.body.dataset.panel = open ? "open" : "closed";
  panelToggle.setAttribute("aria-expanded", String(open));
  panelOpen.setAttribute("aria-expanded", String(open));
  try { localStorage.setItem("nowAtlasPanelOpen", open ? "open" : "closed"); } catch {}
}

panelToggle.addEventListener("click", () => setPanelOpen(false));
panelOpen.addEventListener("click", () => setPanelOpen(true));
resizeHandle.addEventListener("pointerdown", e => {
  e.preventDefault();
  const startX = e.clientX;
  const startWidth = panel.getBoundingClientRect().width;
  resizeHandle.setPointerCapture(e.pointerId);
  const move = ev => setPanelWidth(startWidth + ev.clientX - startX);
  const up = ev => {
    resizeHandle.releasePointerCapture(ev.pointerId);
    window.removeEventListener("pointermove", move);
    window.removeEventListener("pointerup", up);
  };
  window.addEventListener("pointermove", move);
  window.addEventListener("pointerup", up);
});

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.fov = window.innerWidth <= 860 ? 78 : 70;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

try {
  const savedWidth = Number(localStorage.getItem("nowAtlasPanelWidth"));
  if (savedWidth) setPanelWidth(savedWidth);
  setPanelOpen(localStorage.getItem("nowAtlasPanelOpen") !== "closed");
} catch {
  setPanelOpen(true);
}

fetch("shots/manifest.json")
  .then(r => r.json())
  .then(raw => {
    raw.forEach((item, index) => {
      const app = {
        ...item,
        index,
        title: displayName(item),
        domain: item.domain || "Bookmark",
        kind: classify(item),
        img: item.img || "",
        sourceIndex: item.sourceIndex || index + 1
      };
      app.poster = posterFor(app);
      apps.push(app);
    });
    addBackdrop();
    buildAtlas();
    buildClusters();
    filtered = [...apps];
    selectIndex(0, { rotate: true });
    applyFilters({ preserveSelection: true });
    ready = true;
    window.__app.ready = true;
  });

tick();

window.__app = {
  apps,
  cards,
  filtered: () => filtered,
  rot,
  world,
  camera,
  renderer,
  setView,
  selectIndex,
  selected: () => selectedIndex,
  activeCluster: () => activeCluster,
  ready,
  isPanelOpen: () => document.body.dataset.panel === "open",
  panelWidth: () => panel.getBoundingClientRect().width
};
</script>
</body>
</html>
